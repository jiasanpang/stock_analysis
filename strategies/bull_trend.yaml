# Bull Trend Strategy / 多头趋势
# v2: Added market regime filter, MA slope requirement, consolidation detection

name: bull_trend
display_name: 多头趋势
description: 个股分析优先策略，识别多头排列、趋势延续与回踩低吸机会。包含市场环境过滤与趋势质量分级。
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **默认多头趋势（Default Bull Trend Strategy v2）**

  适用场景：
  - 常规个股分析的默认策略。
  - 优先寻找"趋势向上 + 风险可控 + 不追高"的机会。

  ## 0. 市场环境预判（前置过滤）
  在分析个股前，先评估大盘环境：
  - **进攻环境**：上证/沪深300 站上 MA20 且 MA5>MA10 → 个股信号正常执行。
  - **震荡环境**：指数在 MA10~MA20 之间缠绕 → 个股信号有效但仓位建议减半。
  - **防守环境**：指数跌破 MA20 且 MA5<MA10<MA20 → 即使个股多头排列，也降级为"观望"，评分上限 60 分。

  ## 1. 趋势确认（优先级最高）
  使用 `analyze_trend` 判断 MA5/MA10/MA20 排列：

  | 趋势等级 | 条件 | 操作倾向 |
  |----------|------|----------|
  | **强多头** | MA5>MA10>MA20，三线发散，MA20 斜率向上 | 积极做多 |
  | **弱多头** | MA5>MA10 但 MA10≤MA20，均线开始收敛 | 轻仓或观望 |
  | **均线缠绕** | MA5/MA10/MA20 相互距离 <1% | 方向不明，等待突破 |
  | **空头排列** | MA5<MA10<MA20 | 不做多，纯观望 |

  趋势质量评分：
  - MA5 与 MA20 的距离（发散度）> 3%：趋势强劲
  - MA5 与 MA20 的距离 1%~3%：趋势一般
  - MA5 与 MA20 的距离 < 1%：均线缠绕，趋势不明

  ## 2. 位置与节奏（关联理念 1：严进策略）
  - **最佳区域**：价格在 MA5 ±1% 范围内（贴线位置）。
  - **可介入区域**：价格在 MA5 上方 1%~3%（小幅偏离）。
  - **禁止追高**：价格偏离 MA5 > 5% → 直接判定"等回踩"。
  - **回踩优先**：优先寻找"回踩 MA5/MA10 不破 + 企稳反弹"的买点。

  ## 3. 量价验证
  使用 `get_daily_history` 检查近 5~10 日量价关系：
  - **健康上涨**：价涨量增（涨日量 > 跌日量的 1.3 倍以上）。
  - **警惕信号**：缩量上涨（连续 3 日以上量能递减但价格创新高）→ 动能衰竭。
  - **危险信号**：放量滞涨（量比 >2.0 但涨幅 <1%）→ 主力分歧或出货。
  - **回调健康度**：回调时量能萎缩至均量 70% 以下为健康调整。

  ## 4. 交易建议输出
  - 输出明确的"买入/观望/减仓"倾向及触发条件。
  - 必须给出三个价位：**买入参考价、止损价、目标价**。
  - 止损规则：
    - 强多头：止损设在 MA10 下方 1%
    - 弱多头：止损设在 MA20 下方 1%
  - 若无清晰优势，明确写"暂不出手"，避免过度交易。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 强多头 + 趋势发散 + 市场进攻环境 | +15 |
  | 强多头 + 回踩 MA5 企稳 | +12 |
  | 弱多头 + 回踩 MA10 企稳 | +8 |
  | 均线缠绕 / 方向不明 | +0 |
  | 量价背离（缩量新高 / 放量滞涨） | -8 |
  | 跌破 MA20 / 空头排列 | -15 |
  | 市场防守环境（指数空头） | 评分上限 60，仓位减半 |

  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法
