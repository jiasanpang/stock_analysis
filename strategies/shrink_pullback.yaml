# Shrink Volume Pullback Strategy / 缩量回踩
# v2: Added quantitative volume criteria, multi-level support, confirmation candle

name: shrink_pullback
display_name: 缩量回踩
description: 检测缩量回踩均线支撑信号，趋势延续的理想入场点。包含精确量能阈值与多级支撑判定。
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **缩量回踩（Shrink Volume Pullback Strategy v2）**

  核心逻辑：上升趋势中，价格缩量回踩均线支撑后企稳反弹，是风险收益比最佳的入场点。

  ## 0. 市场环境预判（前置过滤）
  - **进攻环境**（指数 MA5>MA10>MA20）→ 正常执行。
  - **震荡环境** → 仅接受回踩 MA10 以上的信号，仓位减半。
  - **防守环境**（指数空头排列）→ 策略暂停，不触发任何买入信号。

  ## 1. 前提条件（必须全部满足）
  使用 `analyze_trend` 确认：
  - ✅ MA5 > MA10 > MA20（多头排列有效）
  - ✅ MA20 斜率向上（非走平或下行）
  - ✅ 近 20 日内有过一次有效上涨波段（涨幅 >5%）

  如果以上三个条件有一个不满足，直接输出"不符合缩量回踩前提"，跳过策略。

  ## 2. 回踩检测（分级支撑）
  使用 `get_daily_history` 和 `get_realtime_quote`：

  | 支撑级别 | 条件 | 信号强度 |
  |----------|------|----------|
  | **一级（MA5）** | 价格与 MA5 偏离 ≤1%，且回调 ≤3 日 | 强 |
  | **二级（MA10）** | 价格与 MA10 偏离 ≤2%，且回调 3~5 日 | 中 |
  | **三级（MA20）** | 价格触及 MA20 附近（偏离 ≤2%） | 弱，需更多确认 |

  ## 3. 缩量标准（精确量化）
  回调期间的量能特征：
  - **标准缩量**：回调日成交量 < 近 5 日均量的 70%
  - **极度缩量**：回调日成交量 < 近 5 日均量的 50% → 信号更强
  - **缩量持续性**：连续 2 日以上缩量 → 比单日缩量更可靠
  - **反面验证**：如果回调日成交量 > 均量，说明有主动抛盘，信号无效

  量能计算方式：
  ```
  volume_ratio = 回调日成交量 / 近5日均量
  缩量有效: volume_ratio < 0.7
  极度缩量: volume_ratio < 0.5
  ```

  ## 4. 企稳确认信号（至少满足一个）
  - 出现阳线（收盘 > 开盘），实体 > 振幅的 50%
  - 出现长下影线（下影线 > 实体的 2 倍），表示买盘承接
  - 当日尾盘价格回到 MA5 以上

  ## 5. 交易建议输出
  - **买入参考价**：MA5 水平价位（一级支撑）或 MA10 水平价位（二级支撑）。
  - **止损价**：
    - 一级支撑入场 → 止损 MA10 下方 1%
    - 二级支撑入场 → 止损 MA20 下方 1%
  - **目标价**：前高或阻力位。
  - 若回调幅度已超过近期涨幅的 50%，视为趋势减弱而非回踩。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 一级支撑 + 极度缩量 + 阳线企稳 | +15 |
  | 一级支撑 + 标准缩量 | +12 |
  | 二级支撑 + 极度缩量 + 阳线企稳 | +10 |
  | 二级支撑 + 标准缩量 | +8 |
  | 三级支撑（MA20）+ 缩量 | +5（需更多确认） |
  | 回调时放量（量比 >1.0） | -8（抛盘明显） |
  | 跌破 MA20 | -15（趋势破坏） |
  | 市场震荡/防守环境 | 评分上限 60 / 策略暂停 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

