# Box Range Trading Strategy / 箱体震荡战法
# v2: Standardized scoring, added box validity scoring, breakout/breakdown handling

name: box_oscillation
display_name: 箱体震荡
description: 识别价格箱体区间，在箱底买入、箱顶减仓。包含箱体有效性评分、假突破识别和突破转换机制。
category: framework
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **箱体震荡战法（Box Range Trading Strategy v2）**

  核心逻辑：箱体内价格在阻力位与支撑位之间反复震荡，
  "贴着支撑买、接近阻力卖"，通过波段操作获取区间收益。

  ## 0. 市场环境影响
  - **进攻环境** → 箱体更可能向上突破，箱底买入胜率高。
  - **震荡环境** → 箱体策略最佳运行环境。
  - **防守环境** → 箱体更可能向下跌破，仅在箱底极低位置轻仓尝试。

  ## 1. 箱体识别与有效性评分
  使用 `get_daily_history` 获取近 60~120 日数据：

  **箱体边界确定：**
  - **箱顶（阻力位）**：多次触碰但未有效突破的高点连线
  - **箱底（支撑位）**：多次下探但未有效跌破的低点连线
  - 使用 `analyze_trend` 的 support_levels / resistance_levels 辅助定位

  **箱体有效性评分：**
  | 指标 | 有效箱体 | 无效箱体 |
  |------|----------|----------|
  | 顶部触碰次数 | ≥ 3 次 | < 2 次 |
  | 底部触碰次数 | ≥ 3 次 | < 2 次 |
  | 箱体持续时间 | > 20 个交易日 | < 10 个交易日 |
  | 箱体宽度 | 5%~20% | < 5%（无操作空间）或 > 25%（非箱体） |

  ## 2. 当前位置判断
  使用 `get_realtime_quote` 获取现价，与箱体边界对比：

  | 位置 | 条件 | 操作建议 |
  |------|------|----------|
  | **箱底区域** | 距支撑 ≤ 5% | 买入/加仓，止损箱底下方 3% |
  | **箱中下沿** | 箱体下方 1/3 | 轻仓布局 |
  | **箱中区域** | 箱体中间 1/3 | 观望，不主动操作 |
  | **箱顶区域** | 距阻力 ≤ 5% | 减仓/止盈 |

  ## 3. 量能辅助判断
  - **箱底放量企稳**：支撑有效的强信号，可较重仓
  - **箱底缩量阴跌**：支撑可能失效，轻仓或观望
  - **箱顶缩量滞涨**：阻力有效，减仓信号
  - **箱顶放量突破**（量 > 均量 × 2.0）→ 转为突破策略

  ## 4. 突破/跌破转换机制

  **向上突破判定：**
  - 连续 2 日收盘在箱顶上方
  - 突破日量 > 均量 × 2.0
  - → 箱体策略结束，切换为多头趋势策略
  - 新目标 = 箱顶 + 箱体高度（等距测量）

  **向下跌破判定：**
  - 连续 2 日收盘在箱底下方
  - 或单日跌破箱底 > 3%
  - → 离场观望，原支撑转阻力

  **假突破识别：**
  - 单日盘中触及边界后快速回撤，收盘回到箱内 → 假突破
  - 量能不足的突破（量比 < 1.5）→ 假突破概率高

  ## 5. 交易建议输出
  - 明确给出箱体顶部价位和底部价位
  - 当前价格所处区间
  - 若价格已突破，说明突破方向及新目标
  - 建议仓位与止损位

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 箱底区域 + 放量企稳 + 箱体有效 | +15 |
  | 箱底区域 + 缩量 + 箱体有效 | +10 |
  | 箱体向上有效突破 | +12（切换趋势策略） |
  | 箱中区域 | +0（观望） |
  | 箱顶区域 | -5（不追高） |
  | 箱底有效跌破 | -15（离场） |
  | 市场防守环境 + 箱底 | 评分上限 60 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

