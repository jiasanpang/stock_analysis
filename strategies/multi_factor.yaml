# Multi-Factor Composite Strategy / 多因子复合策略
# Aggregates signals from trend, volume, pattern, and sentiment dimensions

name: multi_factor
display_name: 多因子复合
description: 综合趋势、量能、形态、情绪四维信号的复合决策策略。通过多维度交叉验证降低单一策略的误判率。
category: framework
core_rules: [1, 2, 3, 4, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
  - search_stock_news

instructions: |
  **多因子复合策略（Multi-Factor Composite Strategy）**

  核心理念：单一策略容易产生假信号，多维度交叉验证可显著提高信号可靠性。
  本策略不独立产生信号，而是对"趋势、量能、形态、情绪"四个维度进行评分后综合决策。

  ## 分析框架：四维评估体系

  ### 维度一：趋势因子（权重 35%）
  使用 `analyze_trend`：

  | 条件 | 得分 |
  |------|------|
  | 强多头排列（MA5>MA10>MA20 发散） | +3 |
  | 弱多头排列（MA5>MA10 但 MA20 走平） | +2 |
  | 均线缠绕（方向不明） | 0 |
  | 弱空头排列 | -2 |
  | 强空头排列（MA5<MA10<MA20 发散） | -3 |

  额外加分：
  - MACD 在零轴上方金叉：+1
  - MACD 底背离：+1
  - MACD 顶背离：-1

  **趋势因子满分：±4 分**

  ### 维度二：量能因子（权重 25%）
  使用 `get_daily_history` 和 `get_realtime_quote`：

  | 条件 | 得分 |
  |------|------|
  | 涨日放量 + 跌日缩量（健康量价关系） | +3 |
  | 量价配合一般 | +1 |
  | 量价无明显特征 | 0 |
  | 缩量上涨（动能不足） | -1 |
  | 放量滞涨 / 放量下跌 | -3 |

  额外加分：
  - 底部放量收阳（底部信号）：+1
  - 连续缩量（洗盘特征）后放量启动：+1

  **量能因子满分：±4 分**

  ### 维度三：形态因子（权重 20%）
  使用 `get_daily_history` 检查 K 线形态：

  | 条件 | 得分 |
  |------|------|
  | 突破形态（放量突破阻力/箱体） | +3 |
  | 回踩企稳形态（缩量回踩均线不破） | +2 |
  | 整理形态（一阳穿多阴、均线粘合蓄势） | +1 |
  | 无明显形态 | 0 |
  | 破位形态（跌破支撑、均线空头发散） | -2 |
  | 顶部形态（长上影、放量滞涨、双顶） | -3 |

  **形态因子满分：±3 分**

  ### 维度四：情绪因子（权重 20%）
  使用 `get_realtime_quote` 和 `search_stock_news`：

  | 条件 | 得分 |
  |------|------|
  | 情绪底部（低换手 + 负面新闻 + 缩量） | +3 |
  | 情绪修复期（换手率从低位回升） | +1 |
  | 情绪平稳 | 0 |
  | 情绪过热（高换手 + 追捧新闻） | -2 |
  | 情绪极热（超高换手 + 媒体狂热） | -3 |

  **情绪因子满分：±3 分**

  ## 综合决策矩阵

  **总分 = 趋势得分 + 量能得分 + 形态得分 + 情绪得分**
  **满分范围：-14 ~ +14**

  | 总分区间 | 综合信号 | 建议操作 |
  |----------|----------|----------|
  | +10 ~ +14 | 极强买入 | 标准仓位买入 |
  | +7 ~ +9 | 强买入 | 2/3 仓位买入 |
  | +4 ~ +6 | 偏多 | 1/3 仓位试探 |
  | -3 ~ +3 | 中性 | 观望 |
  | -6 ~ -4 | 偏空 | 不买入，持有者减仓 |
  | -9 ~ -7 | 强卖出 | 减仓至 1/3 |
  | -14 ~ -10 | 极强卖出 | 清仓 |

  ## 维度冲突处理规则
  当四个维度出现方向冲突时：
  - **趋势与量能冲突**：以趋势为主（趋势权重更高）
  - **形态与情绪冲突**：以形态为主（K 线更客观）
  - **3 个维度同向 vs 1 个反向**：跟随多数，反向维度用于设定风险预案
  - **2 vs 2 冲突**：中性处理，不操作

  ## 与市场环境的结合
  - **进攻环境**：总分正常执行。
  - **震荡环境**：正分打 8 折（降低进攻性）。
  - **防守环境**：正分打 5 折，负分正常执行。

  ## 输出要求
  必须输出：
  1. 四维度各自的得分及关键依据
  2. 维度间是否存在冲突
  3. 加权总分
  4. 市场环境修正后的最终信号
  5. 建议仓位、买入价、止损价、目标价

  ## 评分调整（标准化，映射到 sentiment_score）
  | 多因子总分 | sentiment_score 调整 |
  |------------|---------------------|
  | +10 ~ +14 | +15 |
  | +7 ~ +9 | +12 |
  | +4 ~ +6 | +8 |
  | -3 ~ +3 | +0 |
  | -6 ~ -4 | -8 |
  | -9 ~ -7 | -12 |
  | -14 ~ -10 | -15 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

