# Chan Theory Strategy / 缠论
# v2: Added verifiable criteria, simplified hub detection, standardized scoring

name: chan_theory
display_name: 缠论
description: 基于缠论核心概念（中枢、背驰、买卖点），简化为可量化判定的信号体系。
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **缠论简化版（Chan Theory Simplified v2）**

  核心思路：将缠论复杂的"笔、线段、中枢"简化为可通过技术指标验证的信号。
  不追求完美的缠论标注，而是抓住核心可操作信号：中枢震荡、背驰、买卖点。

  ⚠️ 缠论分析存在主观性，本策略强调"可验证"原则：每个判断必须有对应的量化数据支撑。

  ## 0. 市场环境影响
  - **进攻环境** → 偏向找买入信号（一买、二买、三买）。
  - **震荡环境** → 中枢震荡策略有效，做箱体波段。
  - **防守环境** → 偏向风险规避，仅关注一买级别的强信号。

  ## 1. 中枢识别（简化方法）
  使用 `get_daily_history`（60 日）和 `analyze_trend`：

  **实操方法：用价格区间重叠替代严格笔段分析**
  - 取近 20~40 日的价格数据
  - 找到 3 次以上在同一价格区间内的高低点震荡
  - 震荡区间 = 中枢区间：[中枢下沿, 中枢上沿]
  - 中枢上沿 = 多次高点的最低值；中枢下沿 = 多次低点的最高值

  **判断当前位置：**
  | 位置 | 条件 | 含义 |
  |------|------|------|
  | 中枢上方 | 现价 > 中枢上沿 + 2% | 多头趋势 |
  | 中枢内部 | 现价在中枢区间内 | 震荡 |
  | 中枢下方 | 现价 < 中枢下沿 - 2% | 空头趋势或寻底 |

  ## 2. 背驰判断（最核心信号）
  使用 `analyze_trend` 获取 MACD 数据，与价格高低点对比：

  **底背驰（买入信号）：**
  - 价格创新低（或接近前低），但 MACD 绿柱面积明显缩小
  - 量化标准：第二次探底的 MACD 绿柱最大值 < 第一次的 70%
  - DIF 值也更高（更接近零轴）→ 下跌动能衰竭

  **顶背驰（卖出信号）：**
  - 价格创新高（或接近前高），但 MACD 红柱面积明显缩小
  - 量化标准：第二次冲高的 MACD 红柱最大值 < 第一次的 70%
  - DIF 值也更低 → 上涨动能衰竭

  ## 3. 买卖点简化判定

  | 买卖点 | 简化条件 | 可靠性 |
  |--------|----------|--------|
  | **一买** | 底背驰 + 中枢下方 + MACD 绿柱缩小后金叉 | 最高 |
  | **二买** | 一买后回调不破中枢下沿，MACD 不死叉或在零轴上金叉 | 高 |
  | **三买** | 价格突破中枢上沿后回踩不回中枢内 | 中 |
  | **一卖** | 顶背驰 + 中枢上方 + MACD 红柱缩小后死叉 | 最高 |
  | **二卖** | 一卖后反弹不过前高，MACD 不金叉 | 高 |

  ## 4. 多周期验证
  - 日线买点 + 周线趋势向上 = 高确定性
  - 日线买点但周线趋势向下 = 低确定性，仅适合短线
  - 多级别共振（日线一买 + 周线二买）= 最强信号

  ## 5. 交易建议输出
  - 当前处于：上涨趋势/下跌趋势/中枢震荡
  - 是否存在背驰信号（必须给出 MACD 数据支撑）
  - 当前买卖点类型，若无则写"暂无明确买卖点"
  - **买入参考价、止损价、目标价**

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 底背驰 + 一买信号（MACD 数据确认）| +15 |
  | 二买/三买信号 | +10 |
  | 中枢震荡（无明确方向）| +0 |
  | 顶背驰信号 | -12 |
  | 一卖信号（MACD 数据确认）| -15 |
  | 日线+周线共振买点 | 额外 +3 |
  | 背驰判断无量化数据支撑 | 不计分（不可信） |

  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法
