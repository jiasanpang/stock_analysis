# Unified Risk Management Framework / 统一风控框架
# Applied as overlay to all other strategies

name: risk_management
display_name: 统一风控框架
description: 适用于所有策略的统一风险管理框架。包含止损规则、仓位管理、风险过滤和交易纪律。
category: framework
core_rules: [1, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **统一风控框架（Unified Risk Management Framework）**

  ⚠️ 本框架优先级高于任何单一策略的买入信号。即使策略给出买入信号，
  如果风控条件不满足，也不应执行。

  ## 1. 止损规则（三级止损体系）

  ### 技术止损（优先级最高）
  根据入场策略设定止损位：

  | 入场类型 | 止损位 | 最大容忍回撤 |
  |----------|--------|------------|
  | 趋势跟踪（多头回踩） | MA10/MA20 下方 1% | -5% |
  | 突破策略 | 突破位下方 3% | -5% |
  | 反转策略（底部放量） | 近期低点下方 2% | -8% |
  | 箱体操作 | 箱底下方 3% | -5% |
  | 龙头策略 | 当日/前日低点下方 3% | -8% |

  ### 绝对止损（安全网）
  - 任何个股，买入后最大亏损不超过 **-10%**，到达即无条件止损。
  - 不管策略是否仍然有效，绝对止损不可突破。

  ### 时间止损
  - 买入后 **10 个交易日**内未达到预期走势（既不涨也不明显跌）→ 减仓 50%。
  - 买入后 **20 个交易日**内未达到目标价的 50% → 全部清仓。
  - 避免资金长期锁定在横盘股票中。

  ## 2. 仓位管理规则

  ### 单股仓位
  | 信号强度 | 最大仓位 |
  |----------|----------|
  | 极强信号（多策略共振） | 30% |
  | 强信号 | 20% |
  | 中等信号 | 10%~15% |
  | 弱信号（试探性） | 5%~10% |
  | 反转策略 | 最多 15% |

  ### 总仓位
  | 市场环境 | 建议总仓位 |
  |----------|-----------|
  | 进攻环境（指数多头） | 60%~80% |
  | 震荡环境 | 30%~50% |
  | 防守环境（指数空头） | 0%~20% |

  ### 加减仓规则
  - **分批建仓**：首次买入 1/3 仓位 → 确认后加至 2/3 → 趋势加速加满。
  - **分批减仓**：达到目标价 50% 时减 1/3 → 达到目标价减至 1/3 → 趋势转弱清仓。
  - 禁止一次性满仓买入。
  - 亏损状态下禁止加仓（不摊薄成本）。

  ## 3. 风险过滤器（一票否决）
  以下条件触发时，**直接否决买入**，不管策略信号多强：

  - ❌ 个股处于停牌复牌首日（波动不可控）
  - ❌ 股价偏离 MA5 > 10%（严重追高）
  - ❌ 近 5 日连续涨停后的首次开板（资金出逃风险）
  - ❌ ST/*ST 股票（退市风险）
  - ❌ 近 3 日有重大利空新闻且尚未充分消化
  - ❌ 个股日均换手率 < 0.3%（流动性不足）

  ## 4. 交易纪律
  - **不追涨**：乖离率 > 5% 不新开仓（龙头策略放宽至 7%）。
  - **不抄底**：空头排列 + 下跌趋势中不抄底，除非出现明确反转信号。
  - **不频繁交易**：同一个股 5 个交易日内不反复买卖。
  - **止损必执行**：止损触发后不犹豫、不补仓、不移动止损线。
  - **承认错误**：止损后等待至少 3 个交易日再重新评估同一个股。

  ## 5. 风险等级标注
  在每个分析报告中必须明确标注风险等级：

  | 风险等级 | 条件 | 建议 |
  |----------|------|------|
  | 🟢 低风险 | 多头趋势 + 回踩买点 + 多策略共振 | 标准仓位 |
  | 🟡 中风险 | 趋势不明 + 单一策略信号 | 减半仓位 |
  | 🔴 高风险 | 反转策略 / 弱信号 / 市场防守环境 | 极小仓位或观望 |
  | ⛔ 禁止交易 | 风险过滤器触发 | 不操作 |

  ## 评分调整（标准化）
  风控框架不直接产生买入信号，但会对其他策略的评分施加约束：
  | 条件 | 调整 |
  |------|------|
  | 通过所有风控检查 | +0（不额外加分） |
  | 乖离率 5%~8% | 其他策略评分上限 70 |
  | 乖离率 >8% | 其他策略评分上限 55 |
  | 风险过滤器触发 | 直接否决，评分设为 30 |
  | 绝对止损区域（已浮亏 >8%） | -15（强制减仓信号） |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

