# Bottom Volume Surge Strategy / 底部放量
# v2: Standardized scoring, added decline depth requirement, reversal confirmation stages

name: bottom_volume
display_name: 底部放量
description: 检测长期下跌后底部放量信号。包含下跌深度标准、放量异动分级和反转确认阶段。
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - search_stock_news

instructions: |
  **底部放量（Bottom Volume Surge Strategy v2）**

  核心逻辑：长期下跌后底部出现异常放量，可能是主力资金入场的信号。反转策略风险较高，需严格确认。

  ⚠️ 重要提醒：这是反转策略，胜率低于趋势跟踪策略。仓位必须严格控制。

  ## 0. 市场环境影响
  - **进攻/震荡环境** → 底部反转信号可正常执行。
  - **防守环境** → 个股底部放量可能是补跌中继而非反转，需额外确认（板块企稳 + 基本面催化），评分上限 55。

  ## 1. 下跌深度确认（必须满足）
  使用 `get_daily_history`（30~60 日）：
  - ✅ 从近期高点到低点跌幅 > 20%（充分调整）
  - ✅ 下跌持续时间 > 10 个交易日（非短期洗盘）
  - ✅ `analyze_trend` → trend_status 为 BEAR 或 STRONG_BEAR
  - 如果跌幅 <15% 或下跌天数 <7，不构成"底部"前提。

  ## 2. 量能异动分级

  | 放量级别 | 条件 | 信号强度 |
  |----------|------|----------|
  | **极度放量** | 当日量 > 5 日均量 × 5.0 | 高（但也可能是恐慌抛售） |
  | **强放量** | 当日量 > 5 日均量 × 3.0 | 中高 |
  | **标准放量** | 当日量 > 5 日均量 × 2.0 | 中 |

  关键区分：放量 + 收阳 = 买入信号；放量 + 收阴 = 恐慌出逃，不是底部。

  ## 3. K 线企稳特征（至少满足 2 项）
  - ✅ 当日收阳线（收盘 > 开盘），实体 > 振幅的 40%
  - ✅ 长下影线（下影线 > 实体 × 2），显示买盘承接
  - ✅ 价格守住近期低点（不创新低）
  - ✅ 连续 2 日收在低点上方 2% 以上

  ## 4. 催化剂确认
  使用 `search_stock_news` 搜索近期新闻：
  - 有基本面催化（业绩好转、政策利好、行业拐点）→ 信号增强
  - 无任何催化但放量收阳 → 可能是游资短线行为，降低可信度
  - 有明确利空仍在发酵 → 放量可能是恐慌盘，不是底部

  ## 5. 交易建议输出
  - **仓位**：反转策略最多 2 成仓位，确认后可加至 3 成。
  - **买入参考价**：放量阳线收盘价附近或次日回踩低点。
  - **止损价**：近期最低点下方 2%（严格执行）。
  - **目标价**：第一目标 MA20，第二目标 MA60。
  - 若止损触发，不补仓，等待下一次明确信号。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 强放量 + 阳线企稳 + 催化剂 | +15 |
  | 强放量 + 阳线企稳（无催化） | +10 |
  | 标准放量 + 长下影线企稳 | +8 |
  | 极度放量但收阴 | -5（恐慌盘嫌疑） |
  | 放量但跌破近期低点 | -12（非底部） |
  | 市场防守环境 | 评分上限 55 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

