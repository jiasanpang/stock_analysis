# One Yang Three Yin Strategy / 一阳夹三阴
# v2: Standardized scoring, added pattern quality grading, relaxed to allow 2-4 bearish candles

name: one_yang_three_yin
display_name: 一阳穿多阴
description: 检测阳线包覆多根阴线的整理形态（经典一阳夹三阴及变体），趋势延续入场信号。
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **一阳穿多阴（One Yang Through Yin Strategy v2）**

  核心逻辑：趋势中一根大阳线后出现 2~4 根小阴线（缩量整理），随后又一根阳线收复失地，
  表示整理结束、趋势延续。这是典型的"洗盘结束"形态。

  ## 0. 市场环境预判
  - **进攻环境** → 形态信号正常执行。
  - **震荡环境** → 形态有效但需量能配合，仓位减半。
  - **防守环境** → 形态可靠性低，评分上限 55。

  ## 1. 形态定义（标准版 + 变体）

  **标准版（最近 5 个交易日）：**
  1. **第 1 日**：大阳线（实体 > 股价的 2%）
  2. **第 2~4 日**：连续 3 根阴线或小 K 线
  3. **第 5 日**：阳线收复，收盘价 ≥ 第 1 日收盘价

  **宽松变体（最近 4~7 个交易日）：**
  - 中间阴线数量可为 2~4 根（"一阳夹二阴"到"一阳夹四阴"均有效）
  - 核心不变：大阳 → 缩量小阴整理 → 阳线收复

  ## 2. 形态质量评级

  **A 级形态（最可靠）：**
  - ✅ 中间阴线全部收在第 1 日实体范围内（未跌破第 1 日开盘价）
  - ✅ 中间阴线成交量逐日萎缩（每日量 < 前日量）
  - ✅ 第 5 日阳线收盘 > 第 1 日收盘（完全收复）
  - ✅ 第 5 日量能 > 中间阴线平均量的 1.5 倍

  **B 级形态（可操作）：**
  - ✅ 中间阴线未跌破第 1 日开盘价
  - ✅ 缩量但未严格递减
  - ⚠️ 第 5 日收盘接近但未完全突破第 1 日高点

  **C 级形态（信号弱）：**
  - ⚠️ 中间阴线跌破第 1 日开盘价（回调过深）
  - ⚠️ 中间阴线没有缩量（有主动抛盘）
  - → 降级处理，不建议入场

  ## 3. 趋势验证（必须条件）
  使用 `analyze_trend` 确认：
  - ✅ MA5 > MA10 > MA20（多头排列）
  - ✅ 形态出现在上升趋势中（非下跌反弹）
  - 若形态出现在空头趋势中 → 可能是下跌中继，不做多

  ## 4. 交易建议输出
  - **买入参考价**：第 5 日收盘价附近，或次日开盘确认不跌破。
  - **止损价**：第 1 日开盘价下方 1%。
  - **目标价**：前高或第 1 日涨幅等距延伸。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | A 级形态 + 多头趋势 + 进攻环境 | +15 |
  | A 级形态 + 多头趋势 | +12 |
  | B 级形态 + 多头趋势 | +8 |
  | 形态成立但趋势不明 | +3 |
  | C 级形态（回调过深或不缩量） | -5 |
  | 空头趋势中出现该形态 | -10（下跌中继风险） |
  | 市场防守环境 | 评分上限 55 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

