# Dragon Head Strategy / 龙头策略
# v2: Standardized scoring, added sector momentum scoring, leadership persistence check

name: dragon_head
display_name: 龙头策略
description: 板块轮动中识别龙头股。包含板块动量评分、龙头持续性验证和市场环境过滤。
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
  - get_daily_history

instructions: |
  **龙头策略（Dragon Head Strategy v2）**

  核心逻辑：板块启动时率先领涨、带动板块情绪的个股就是龙头。龙头策略的核心不在于追涨，而在于识别"谁在领涨"以及"板块是否真的在启动"。

  ## 0. 市场环境影响
  - **进攻环境** → 龙头策略最佳运行环境，板块轮动活跃。
  - **震荡环境** → 龙头持续性差，适合短线快进快出。
  - **防守环境** → 不适合龙头策略，板块普跌中无真龙头，评分上限 50。

  ## 1. 板块动量评估
  使用 `get_sector_rankings`：
  - 目标板块近 3 日涨幅排名前 10 → 板块处于启动期
  - 目标板块近 5 日涨幅排名前 5 → 板块处于主升期
  - 板块内涨停/涨幅 >5% 的个股数量 ≥3 → 板块热度确认
  - 若板块排名 >30 或近期持续下跌 → 不存在龙头逻辑

  ## 2. 龙头特征识别
  使用 `get_realtime_quote` 和 `get_daily_history`：

  | 龙头指标 | 条件 | 权重 |
  |----------|------|------|
  | **领涨度** | 个股涨幅 > 板块均值 + 2% | 高 |
  | **换手率** | > 5%（活跃交易） | 中 |
  | **量比** | > 1.5（资金关注） | 中 |
  | **涨停/大涨** | 板块启动日率先涨停或涨幅最大 | 高 |
  | **持续性** | 连续 2 日以上领涨板块 | 关键 |

  龙头确认需满足：领涨度 + 至少 2 个其他指标。

  ## 3. 龙头持续性验证
  使用 `get_daily_history` 检查近 5 日：
  - 连续 3 日涨幅均 > 板块均值 → 真龙头
  - 首日大涨但后续跟不上 → 一日游，不是龙头
  - 回调幅度 < 板块均值 → 抗跌性强，龙头特征

  ## 4. 新闻催化验证
  使用 `search_stock_news`：
  - 板块级催化（政策、事件、业绩周期）→ 龙头行情可持续
  - 纯情绪炒作（无基本面支撑）→ 龙头持续性差，仅适合超短线
  - 个股独有催化（并购、技术突破）→ 可能是题材股而非板块龙头

  ## 5. 入场策略（龙头不等于追涨）
  - **最佳入场**：龙头首次打开涨停或首次回调至 MA5 不破。
  - **次优入场**：板块启动次日，龙头高开但未高开太多（<3%）。
  - **禁止追高**：乖离率 > 10% 不追，等分歧日（回调）。
  - 龙头可适当放宽乖离率至 7%（相比普通股 5%），但 >10% 仍需谨慎。

  ## 6. 交易建议输出
  - **仓位**：龙头策略最多 3 成仓位（波动大）。
  - **止损**：首日入场 → 止损当日最低价下方 3%。
  - **止盈**：板块热度消退（排名跌出前 10）→ 减仓。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 真龙头确认 + 板块主升期 + 进攻环境 | +15 |
  | 真龙头确认 + 板块启动期 | +12 |
  | 疑似龙头（领涨但持续性待验证） | +8 |
  | 板块催化 + 龙头共振 | 额外 +3 |
  | 一日游（首日大涨后续走弱）| -8 |
  | 乖离率 >10% | -10（追高风险） |
  | 市场防守环境 | 评分上限 50 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

