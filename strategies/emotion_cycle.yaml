# Sentiment Cycle Strategy / 情绪周期
# v2: Standardized scoring, added quantitative checklist, clearer stage definitions

name: emotion_cycle
display_name: 情绪周期
description: 基于市场情绪量化指标（换手率、量能、新闻面），识别情绪极端点进行逆向布局。
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news

instructions: |
  **情绪周期策略（Sentiment Cycle Strategy v2）**

  核心哲学：市场情绪在"恐慌 → 修复 → 乐观 → 狂热"间循环。
  在情绪极端点逆向操作：恐慌底部布局，狂热顶部离场。

  ## 0. 市场环境协同
  - 大盘情绪与个股情绪同步判断，两者共振时信号最强。
  - 大盘恐慌 + 个股恐慌 = 最佳底部信号。
  - 大盘狂热 + 个股狂热 = 最强顶部信号。

  ## 1. 情绪量化指标体系

  ### A. 换手率（情绪热度核心指标）
  使用 `get_daily_history` 和 `get_realtime_quote`：

  | 换手率区间 | 情绪阶段 | 操作倾向 |
  |-----------|----------|----------|
  | < 0.5%/日 | 冰点 | 底部关注 |
  | 0.5%~2% | 平稳 | 正常交易 |
  | 2%~5% | 活跃 | 注意风险 |
  | 5%~10% | 高热 | 开始减仓 |
  | > 10% | 极热 | 警惕顶部 |

  ### B. 换手率趋势（比绝对值更重要）
  计算近 20 日换手率走势：
  - **持续降温**（由高到低 + 量缩）→ 情绪退潮，耐心等待底部信号
  - **加速升温**（由低到高 + 量增）→ 情绪启动期，可介入
  - **突然暴量**（单日换手率 > 前 5 日均值 × 5）→ 通常是阶段性顶部或恐慌底部

  ### C. 量价背离检测
  - 价涨量缩（连续 3 日以上）→ 上涨动能衰竭，顶部预警
  - 价跌量缩（连续 3 日以上）→ 抛压减轻，底部预兆

  ## 2. 情绪底部评分卡（逐项检查）

  | 序号 | 底部指标 | 满足 |
  |------|----------|------|
  | 1 | 近 20 日换手率处于近半年低位区间 | ☐ |
  | 2 | 成交量 < 60 日均量的 50% | ☐ |
  | 3 | 近期新闻以中性/负面为主（无追捧） | ☐ |
  | 4 | 股价在 MA20 附近或以下 | ☐ |
  | 5 | MA5/MA10/MA20 三线粘合（均线收缩） | ☐ |

  - 满足 ≥ 4 项：强底部信号
  - 满足 3 项：中等底部信号
  - 满足 < 3 项：不构成底部

  ## 3. 情绪顶部评分卡（逐项检查）

  | 序号 | 顶部指标 | 满足 |
  |------|----------|------|
  | 1 | 近 5 日换手率 > 20 日均值的 2 倍 | ☐ |
  | 2 | 单日成交量脉冲式放大 | ☐ |
  | 3 | 新闻以利好兑现、机构推荐、散户追捧为主 | ☐ |
  | 4 | 股价偏离 MA5 > 8%（高乖离率） | ☐ |
  | 5 | MACD 出现顶背离 | ☐ |

  - 满足 ≥ 4 项：强顶部信号
  - 满足 3 项：中等顶部信号
  - 满足 < 3 项：不构成顶部

  ## 4. 新闻情绪面分析
  使用 `search_stock_news`：
  - 新闻集中出现"涨停、利好、机构看多" → 可能过热
  - 新闻集中出现"利空、下跌、风险" → 悲观情绪可能造就底部
  - 舆论一致看好/看衰时 → 反向指标

  ## 5. 交易建议输出
  - 当前情绪阶段判断（底部/平稳/升温/过热/顶部）
  - 底部/顶部评分卡逐项结果
  - 逆情绪操作建议

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 底部评分卡满足 ≥ 4 项 | +15 |
  | 底部评分卡满足 3 项 | +10 |
  | 情绪平稳区间 | +0 |
  | 顶部评分卡满足 3 项 | -10 |
  | 顶部评分卡满足 ≥ 4 项 | -15 |
  | 极端恐慌（底部全满足 + 大盘共振） | +18（最大） |
  | 极端狂热（顶部全满足 + 大盘共振） | -18（最大） |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

