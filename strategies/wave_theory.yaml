# Elliott Wave Theory Strategy / 波浪理论
# v2: Added verifiable criteria, Fibonacci levels, confidence grading

name: wave_theory
display_name: 波浪理论
description: 基于艾略特波浪理论的推动浪与调整浪结构，简化为可量化的浪型判定和斐波那契目标价。
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **波浪理论简化版（Elliott Wave Theory v2）**

  核心原则：市场按照 5 浪推进 + 3 浪调整的循环运行。
  本策略不追求完美数浪，而是抓住最可操作的浪型位置（2 浪底、3 浪起点、5 浪末端）。

  ⚠️ 波浪计数存在强主观性，本策略要求每个浪型判断必须附带置信度和验证方法。

  ## 0. 市场环境影响
  - **进攻环境** → 推动浪结构更可能有效。
  - **震荡环境** → 可能处于大级别调整浪中，短线操作为主。
  - **防守环境** → 大概率处于 C 浪或大级别调整，以规避风险为主。

  ## 1. 浪型识别（简化方法）
  使用 `get_daily_history`（120 日）和 `analyze_trend`：

  **不要试图标注所有浪，聚焦于以下关键判断：**

  ### A. 是否处于推动浪中？
  - 从近期明确低点开始，价格是否有"涨→调→涨→调→涨"的节奏？
  - MACD 在推动过程中是否主要在零轴上方？
  - 第 3 浪的涨幅通常是最大的（> 第 1 浪的 1.618 倍）

  ### B. 是否处于调整浪中？
  - 从近期高点开始，价格是否有"跌→弹→跌"的节奏？
  - MACD 是否在零轴下方运行？
  - A 浪急跌 → B 浪弱反弹（不过前高）→ C 浪深跌

  ### C. 关键浪型位置判定

  | 浪型位置 | 可量化特征 | 操作 |
  |----------|-----------|------|
  | **2 浪底**（黄金坑）| 回调至 1 浪的 38.2%~61.8%，缩量，MACD 绿柱缩小 | 最佳买点 |
  | **3 浪起点** | 放量突破 1 浪高点，MACD 在零轴上方金叉 | 追涨买点 |
  | **4 浪底** | 回调至 3 浪的 23.6%~38.2%，不进入 1 浪顶部价格区域 | 次优买点 |
  | **5 浪末端** | MACD 红柱 < 3 浪红柱（顶背离），量能萎缩 | 减仓/卖出 |
  | **B 浪顶** | 反弹不过前高，量能弱，MACD 在零轴下 | 禁止买入 |
  | **C 浪底** | 恐慌性下跌后的企稳，MACD 底背离 | 反转布局 |

  ## 2. 斐波那契关键位计算
  找到明确的起涨点和高点后：
  - 0.236 回撤：浅回调（强势调整）
  - 0.382 回撤：标准调整
  - 0.500 回撤：中等调整
  - 0.618 回撤：深度调整（2 浪常见终点）
  - 1.618 延伸：3 浪常见目标
  - 2.618 延伸：强势 3 浪目标

  ## 3. 波浪规则验证（违反则重新数浪）
  - ❌ 第 2 浪回调不能超过第 1 浪起点
  - ❌ 第 3 浪不能是推动浪中最短的
  - ❌ 第 4 浪不能进入第 1 浪价格区域
  - 任一规则违反 → 当前数浪无效，标注"置信度：低"

  ## 4. 置信度分级
  | 置信度 | 条件 |
  |--------|------|
  | **高** | 浪型节奏清晰、斐波那契位吻合、MACD 配合、波浪规则未违反 |
  | **中** | 浪型大致可辨、部分指标配合 |
  | **低** | 浪型模糊、指标冲突、或波浪规则被违反 |

  - 高置信度：可据此操作
  - 中置信度：仅作参考，需结合其他策略
  - 低置信度：不作为交易依据

  ## 5. 交易建议输出
  - 当前可能的浪型位置（附置信度）
  - 关键斐波那契支撑/阻力位
  - 操作建议（买入/等待/规避）
  - **买入参考价、止损价、目标价**

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 2 浪底部企稳（高置信度）| +15 |
  | 3 浪突破确认（高置信度）| +12 |
  | 4 浪调整企稳 | +8 |
  | 浪型不明确（低置信度）| +0（不计分） |
  | 5 浪末端/顶背离 | -10 |
  | B 浪反弹陷阱 | -12 |
  | C 浪下跌中 | -15 |
  | 多级别共振（日线+周线同方向）| 额外 +3 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

