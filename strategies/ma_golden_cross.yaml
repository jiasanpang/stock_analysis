# MA Golden Cross Strategy / 均线金叉
# v2: Standardized scoring, added market regime filter, improved cross quality grading

name: ma_golden_cross
display_name: 均线金叉
description: 检测均线金叉配合量能确认信号。包含金叉质量分级、MACD 共振验证和市场环境过滤。
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **均线金叉（MA Golden Cross Strategy v2）**

  核心逻辑：均线交叉反映趋势转折，但需量能确认和位置过滤来剔除假信号。

  ## 0. 市场环境预判（前置过滤）
  - **进攻环境** → 金叉信号正常执行。
  - **震荡环境** → 仅接受 MA10×MA20 级别金叉，MA5×MA10 易反复。
  - **防守环境** → 金叉可靠性低，评分上限 60。

  ## 1. 金叉检测与分级
  使用 `analyze_trend` 检查均线排列和 MACD 状态：

  | 金叉级别 | 条件 | 可靠性 |
  |----------|------|--------|
  | **一级（MA10×MA20）** | MA10 在近 5 日内上穿 MA20 | 高（慢线交叉） |
  | **二级（MA5×MA10）** | MA5 在近 3 日内上穿 MA10 | 中（快线交叉） |
  | **多级共振** | MA5×MA10 + MA10×MA20 在 5 日内先后发生 | 最高 |

  ## 2. 量能确认
  使用 `get_daily_history` 验证：
  - 金叉日成交量 > 5 日均量的 1.2 倍 → 有效
  - 金叉日成交量 > 5 日均量的 1.5 倍 → 强确认
  - 金叉日成交量 < 5 日均量 → 假信号风险高

  ## 3. MACD 共振验证
  - MACD 同步金叉（DIF 上穿 DEA）→ 信号增强
  - MACD 零轴上方金叉 → 强势延续信号
  - MACD 零轴下方金叉 → 弱反弹，需更多确认
  - MACD 底背离 + 金叉 → 反转信号强化

  ## 4. 趋势背景
  - **盘整后金叉**（均线粘合 →发散）：最强信号
  - **上升趋势中金叉**：延续信号，可靠性中等
  - **深度下跌中金叉**：弱信号，常有反复，需 MACD 底背离配合

  ## 5. 价格位置过滤
  - 价格在交叉均线附近（乖离率 < 3%）→ 最佳入场
  - 乖离率 3%~5% → 可入场但需控制仓位
  - 乖离率 > 5% → 不追高，等回踩至均线位

  ## 6. 交易建议输出
  - **买入参考价**：交叉均线价位附近。
  - **止损价**：交叉均线下方 3%。
  - **目标价**：前高或上方阻力位。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | 多级共振（MA5+MA10+MA20 三线金叉）+ 放量 | +15 |
  | 一级金叉（MA10×MA20）+ 量能确认 | +12 |
  | 二级金叉（MA5×MA10）+ 量能确认 | +8 |
  | MACD 零轴上方金叉共振 | 额外 +5 |
  | 金叉但量能不足 | +3（弱信号） |
  | 乖离率 >5% | -8（追高风险） |
  | 市场防守环境 | 评分上限 60 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

